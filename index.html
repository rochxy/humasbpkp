<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring Komunikasi Publik</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="title">
        DASHBOARD KOMUNIKASI PUBLIK
    </div>

    <div id="clock">
        Loading...
    </div>
</header>

<div class="top-section">

    <div class="card stat-card">
        <div class="stat-number" id="totalAgenda">0</div>
        <div class="stat-label">Total Agenda 2026</div>
    </div>

    <div class="card stat-card">
        <div class="stat-number" id="agendaHariIni">0</div>
        <div class="stat-label">Agenda Hari Ini</div>
    </div>

    <div class="card stat-card">
        <div class="stat-number" id="personelHariIni">0</div>
        <div class="stat-label">Personel Bertugas Hari Ini</div>
    </div>

</div>

<div class="agenda-layout">

    <div class="card agenda-main">

        <h2>Agenda Kegiatan</h2>

        <div class="agenda-wrapper">
            <div id="agendaCards"></div>
        </div>

    </div>

    <div class="card agenda-today">

        <div id="widgetNow"></div>

        <div id="widgetTomorrow"></div>
        
        <div class="card-mini">

    <h3>Statistik Kategori 2026</h3>

    <div id="kategori2026">

        Memuat...

    </div>

</div>

        <h2>Agenda Hari Ini</h2>

        <div id="todayAgenda">
            Memuat data...
        </div>

    </div>

</div>

<footer>
    <marquee>
        Dashboard Monitoring Kehumasan BPKP
    </marquee>
</footer>

<script src="script.js"></script>

</body>
</html>
